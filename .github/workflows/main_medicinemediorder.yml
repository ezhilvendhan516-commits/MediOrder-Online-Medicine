name: Build and Deploy Vite App to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Debug structure
        run: ls -R .

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install
        working-directory: "MediOrder Online Medicine System"

      - name: Build project
        run: npm run build
        working-directory: "MediOrder Online Medicine System"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: built-frontend
          path: MediOrder Online Medicine System/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: built-frontend

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_89906FDC87844E94BC93AF8B7ED59C7E }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_3C69F9156E4C433DAFC51D21CB2E25A0 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_FD571267C4914C52BB33646F1AA8A794 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: "medicinemediorder"
          slot-name: "Production"
          package: .
